services:
  graphql-engine:
    image: hasura/graphql-engine:v2.48.16
    volumes:
      - ./viewer/graphql-engine-metadata:/metadata
    ports:
      - 8084:8080
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://visionzero:visionzero@postgis:5432/vision_zero
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_CONSOLE_ASSETS_DIR: /srv/console-assets
      HASURA_GRAPHQL_NO_OF_RETRIES: 30
    depends_on:
      - postgis

  postgis:
    shm_size: ${PG_SHM_SIZE:-8g}
    image: atddocker/postgis:unified-db
    env_file:
      - .env
    volumes:
      - ./database/snapshots:/snapshots
    ports:
      - 5431:5432
    command:
      - postgres
      - -c
      - maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-2GB}
      - -c
      - max_wal_size=${PG_MAX_WAL_SIZE:-4GB}
      - -c
      - shared_buffers=${PG_SHARED_BUFFERS:-8GB}
      - -c
      - work_mem=${PG_WORK_MEM:-64MB}
      - -c
      - effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-24GB}
      - -c
      - checkpoint_completion_target=${PG_CHECKPOINT_COMPLETION_TARGET:-0.9}
      - -c
      - random_page_cost=${PG_RANDOM_PAGE_COST:-1.1}
      - -c
      - effective_io_concurrency=${PG_EFFECTIVE_IO_CONCURRENCY:-200}
      - -c
      - max_connections=${PG_MAX_CONNECTIONS:-100}
      - -c
      - default_statistics_target=${PG_DEFAULT_STATISTICS_TARGET:-200}
      - -c
      - jit=${PG_JIT:-off}
      - -c
      - wal_compression=${PG_WAL_COMPRESSION:-on}

  cr3-user-api:
    build: api
    image: cr3-user-api
    # image: atddocker/vz-user-cr3-api
    env_file:
      - api/.env
    ports:
      - 8085:5000
    volumes:
      - ./api:/usr/src/app
    command: flask run --host=0.0.0.0 --port=5000 --debug

networks:
  default:
    name: vision-zero_default
