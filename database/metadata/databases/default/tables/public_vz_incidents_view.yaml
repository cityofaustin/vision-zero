table:
  name: vz_incidents_view
  schema: public
array_relationships:
  - name: cad_incidents
    using:
      manual_configuration:
        column_mapping:
          id: vz_incident_id
        insertion_order: null
        remote_table:
          name: cad_incidents
          schema: public
select_permissions:
  - role: editor
    permission:
      columns:
        - addresses
        - address_earliest
        - agencies
        - call_dispositions
        - final_problems
        - incident_numbers
        - initial_problems
        - location_ids
        - cad_incident_count
        - id
        - spread_meters
        - time_spread_minutes
        - response_date_earliest
        - time_first_unit_arrived_earliest
        - in_austin_full_purpose
        - point_feature
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: readonly
    permission:
      columns:
        - addresses
        - address_earliest
        - agencies
        - call_dispositions
        - final_problems
        - incident_numbers
        - initial_problems
        - location_ids
        - cad_incident_count
        - id
        - spread_meters
        - time_spread_minutes
        - response_date_earliest
        - time_first_unit_arrived_earliest
        - in_austin_full_purpose
        - point_feature
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: vz-admin
    permission:
      columns:
        - addresses
        - address_earliest
        - agencies
        - call_dispositions
        - final_problems
        - incident_numbers
        - initial_problems
        - location_ids
        - cad_incident_count
        - id
        - spread_meters
        - time_spread_minutes
        - response_date_earliest
        - time_first_unit_arrived_earliest
        - in_austin_full_purpose
        - point_feature
      filter: {}
      allow_aggregations: true
    comment: ""
