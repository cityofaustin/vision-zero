# Default used by main/deploy previews
[build]
  publish = "build"
  command = "npm run lint && npm run build:staging"

# Production specific build command
[context.production]
  command = "npm run lint && npm run build:production"

# This rule handles the root path and redirects to /viewer/
[[redirects]]
  from = "/"
  to = "/viewer/"
  status = 302

# Redirect to the index page of the SPA
[[redirects]]
  from = "/viewer/*"
  to = "/viewer/index.html"
  status = 200