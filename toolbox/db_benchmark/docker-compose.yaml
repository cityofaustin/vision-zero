services:
  benchmark-db:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PGHOST: ${PGHOST:-host.docker.internal}
      PGPORT: "${PGPORT:-5431}"
      PGDATABASE: ${PGDATABASE:-vision_zero}
      PGUSER: ${PGUSER:-visionzero}
      PGPASSWORD: ${PGPASSWORD:-visionzero}
      PGOPTIONS: ${PGOPTIONS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["python", "benchmark_db.py"]
    command: ["--sql-file", "timing_query.sql"]
